name: Keep Backend Warm

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Replace the URL below with your actual deployed Render URL
          curl -f https://dubai-news-rt.onrender.com/health || echo "Ping failed, but that's okay"
